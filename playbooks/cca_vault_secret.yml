---
# Playbook to generate Splunk encrypted string and ansible vault string
#
# REPO_TYPE=infrastructure
# MENU_DESC=Generate Splunk secret and ansible vault string
# EXTRA_VARS=hide_password(true)

- name: Playbook to generate Splunk encrypted string and ansible vault string
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: Select what to generate
      ansible.builtin.pause:
        prompt: |-
          What do you want to generate?
            1) splunk  - Splunk encrypted string + Ansible vault (my_secret_hash + my_secret)
            2) user    - Splunk admin password hash + Ansible vault (cca_splunk_admin_password_hash + cca_splunk_admin_password)
            3) both    - Generate all of the above
          Enter choice [splunk/user/both] (default: both):
      register: cca_secret_mode_input

    - name: Normalize selected mode
      ansible.builtin.set_fact:
        cca_secret_mode: >-
          {{
            ({
              '1': 'splunk',
              '2': 'user',
              '3': 'both',
              'splunk': 'splunk',
              'user': 'user',
              'both': 'both',
              '': 'both'
            }).get((cca_secret_mode_input.user_input | default('') | trim | lower), (cca_secret_mode_input.user_input | default('') | trim | lower))
          }}

    - name: Validate selected mode
      ansible.builtin.assert:
        that:
          - cca_secret_mode in ['splunk', 'user', 'both']
        fail_msg: >-
          Invalid selection '{{ cca_secret_mode }}'. Expected one of: splunk, user, both.

    - name: Prompt for password to hash/encrypt
      ansible.builtin.pause:
        prompt: "Enter the password to hash and/or encrypt (no echo):"
        echo: false
      register: secret_password_input
      when:
        - cca_secret_mode in ['splunk', 'user', 'both']
      no_log: "{{ hide_password | default(true) }}"

    - name: Set secret_password from prompt
      ansible.builtin.set_fact:
        secret_password: "{{ secret_password_input.user_input }}"
      when:
        - secret_password_input is defined
        - secret_password_input.user_input is defined
        - secret_password_input.user_input | trim | length > 0
      no_log: "{{ hide_password | default(true) }}"

    - name: Hash the password (pcrypt rounds=700000)
      ansible.builtin.command:
        cmd: pcrypt -r 700000
        stdin: "{{ secret_password ~ '\n' }}"
      register: secret_password_hash
      changed_when: false
      when:
        - cca_secret_mode in ['user', 'both']
        - secret_password is defined
      no_log: "{{ hide_password | default(true) }}"

    - name: Assert cca_splunk_secret is defined when generating Splunk encrypted string
      ansible.builtin.assert:
        that:
          - cca_splunk_secret is defined
        fail_msg: >-
          cca_splunk_secret is not defined. Provide it via inventory/group_vars or pass it as an extra-var.
      when:
        - cca_secret_mode in ['splunk', 'both']

    - name: Encrypt the password
      ansible.builtin.command:
        cmd: >
          python3 {{ lookup('env', 'CCA_REPO_DIR') }}/roles/cca.core.splunk/files/bin/splunk_secret_helper.py
          --splunk-secret {{ cca_splunk_secret }}
          --cleartext '{{ secret_password }}'
      register: encrypted_random_secret
      changed_when: false
      when:
        - cca_secret_mode in ['splunk', 'both']
        - secret_password is defined
        - cca_splunk_secret is defined
      no_log: "{{ hide_password | default(true) }}"

    - name: Vault the secret password
      ansible.builtin.set_fact:
        vaulted_secret_value: >-
          {{ secret_password | vault(lookup('ansible.builtin.file', ansible_env.ANSIBLE_VAULT_PASSWORD_FILE))
          | split() | join('\r\n')
          | regex_replace('1.2;AES256;filter_default', '1.1;AES256') }}
      when:
        - secret_password is defined
        - cca_secret_mode in ['splunk', 'user', 'both']
      no_log: "{{ hide_password | default(true) }}"

    - name: Print the encrypted and vaulted secret (Splunk-encrypted fields)
      ansible.builtin.debug:
        msg: |
          my_secret_hash: {{ encrypted_random_secret.stdout }}
          my_secret: !vault "{{ vaulted_secret_value }}"
      when:
        - cca_secret_mode in ['splunk', 'both']
        - encrypted_random_secret.stdout is defined
        - vaulted_secret_value is defined

    - name: Print the encrypted and vaulted secret (Splunk admin password fields)
      ansible.builtin.debug:
        msg: |
          cca_splunk_admin_password_hash: '{{ secret_password_hash.stdout }}'
          cca_splunk_admin_password: !vault "{{ vaulted_secret_value }}"
      when:
        - cca_secret_mode in ['user', 'both']
        - secret_password_hash.stdout is defined
        - vaulted_secret_value is defined
