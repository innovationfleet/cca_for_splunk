---
# tasks file for cca.splunk.onboarding
#
# Description:
#
# Prerequisite:
#
# Author: Roger Lindquist (github.com/rlinq)
#
# Release: 2026.1.1

- name: DRY RUN - Perform a dry run of the staged files towards the target to collect rsync changes
  become: false
  ansible.posix.synchronize:
    src: '{{ shcluster_staging_dir }}/apps/'
    dest: '{{ splunk_path }}/etc/shcluster/apps/'
    copy_links: true
    recursive: true
    checksum: true
    times: false
    delete: true
    owner: false
    group: false
    archive: false
    use_ssh_args: "{{ synchronize_module_use_ssh_args | default(false) }}"
    rsync_path: '{% if splunk_user == ansible_ssh_user %}rsync{% else %}sudo -u {{ splunk_user }} rsync{% endif %}'
    rsync_opts: '{{ shcluster_apps_rsync_opts + item.rsync_opts if item.rsync_opts is defined else shcluster_apps_rsync_opts }}'
  register: shcluster_apps_update_status
  check_mode: true
  no_log: "{{ hide_password }}"
  changed_when: false

- name: Extract deleted apps from rsync output during dry run
  ansible.builtin.set_fact:
    deleted_shc_apps: "{{ (shcluster_apps_update_status.stdout_lines | default([])) | extract_deleted_apps }}"
  no_log: "{{ hide_password }}"

- name: Count apps on remote shcluster deployer destination
  ansible.builtin.find:
    paths: "{{ splunk_path }}/etc/shcluster/apps/"
    file_type: directory
    recurse: false
  register: dest_shc_apps_result
  no_log: "{{ ansible_verbosity < 3 }}"

- name: Calculate deletion threshold for shcluster apps
  ansible.builtin.set_fact:
    shc_deletion_check: >-
      {{ deleted_shc_apps | check_deletion_threshold(
           (dest_shc_apps_result.files | length | int),
           (shc_app_removal_percent_threshold | default(10) | int),
           (shc_app_removal_max_count | default(3) | int),
           (shc_app_removal_min_apps_for_percent | default(10) | int)
         ) }}

- name: Assert shcluster app deletions are within safe threshold
  ansible.builtin.assert:
    that:
      - shc_deletion_check.is_within_threshold
    fail_msg: >-
      SHC app deletion exceeds safe threshold!
      {{ shc_deletion_check.deleted_count }} apps would be deleted out of
      {{ shc_deletion_check.total_count }} total on destination.
      Threshold: {{ shc_deletion_check.threshold_type }} =
      {{ shc_deletion_check.threshold_value }}{% if shc_deletion_check.threshold_type == 'percent' %}%
      (max {{ shc_deletion_check.max_allowed }} apps){% endif %}.
      Apps to delete: {{ deleted_shc_apps | join(', ') }}.
      To force deletion, set accept_shc_app_removal to true.
    success_msg: >-
      SHC app deletion within safe threshold ({{ shc_deletion_check.deleted_count }}/{{ shc_deletion_check.total_count }} apps on destination)
  when:
    - not (accept_shc_app_removal | default(false))
    - deleted_shc_apps | length > 0

- name: Deploy the apps from the staging directory to the deployer
  become: false
  ansible.posix.synchronize:
    src: '{{ shcluster_staging_dir }}/apps/'
    dest: '{{ splunk_path }}/etc/shcluster/apps/'
    copy_links: true
    recursive: true
    checksum: true
    times: false
    delete: true
    owner: false
    group: false
    archive: false
    use_ssh_args: "{{ synchronize_module_use_ssh_args | default(false) }}"
    rsync_path: '{% if splunk_user == ansible_ssh_user %}rsync{% else %}sudo -u {{ splunk_user }} rsync{% endif %}'
    rsync_opts: '{{ shcluster_apps_rsync_opts + item.rsync_opts if item.rsync_opts is defined else shcluster_apps_rsync_opts }}'
  notify: notify shcluster bundle push

- name: Cleanup manager after app deployment
  become: false
  connection: local
  ansible.builtin.file:
    path: '{{ shcluster_staging_dir }}'
    state: absent
  delegate_to: localhost
  when:
    - shcluster_label is defined
    - cleanup_staging_apps | default(true)
  changed_when: false
  check_mode: false
