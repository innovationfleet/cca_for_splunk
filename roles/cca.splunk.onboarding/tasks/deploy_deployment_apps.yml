---
# tasks file for cca.splunk.onboarding
#
# Description:
#
# Prerequisite:
#
# Author: Roger Lindquist (github.com/rlinq)
#
# Release: 2026.1.1

- name: Extract deleted apps from rsync output during dry run
  ansible.builtin.set_fact:
    deleted_deployment_apps: "{{ (deployment_apps_update_status.stdout_lines | default([])) | extract_deleted_apps }}"
  no_log: "{{ hide_password }}"

- name: Count apps on remote deployment server destination
  ansible.builtin.find:
    paths: "{{ splunk_path }}/etc/deployment-apps/"
    file_type: directory
    recurse: false
  register: dest_deployment_apps_result
  no_log: "{{ ansible_verbosity < 3 }}"

- name: Calculate deletion threshold for deployment apps
  ansible.builtin.set_fact:
    deployment_deletion_check: >-
      {{ deleted_deployment_apps | check_deletion_threshold(
           (dest_deployment_apps_result.files | length | int),
           (deployment_app_removal_percent_threshold | default(10) | int),
           (deployment_app_removal_max_count | default(3) | int),
           (deployment_app_removal_min_apps_for_percent | default(10) | int)
         ) }}

- name: Assert deployment app deletions are within safe threshold
  ansible.builtin.assert:
    that:
      - deployment_deletion_check.is_within_threshold
    fail_msg: >-
      Deployment app deletion exceeds safe threshold!
      {{ deployment_deletion_check.deleted_count }} apps would be deleted out of
      {{ deployment_deletion_check.total_count }} total on destination.
      Threshold: {{ deployment_deletion_check.threshold_type }} =
      {{ deployment_deletion_check.threshold_value }}{% if deployment_deletion_check.threshold_type == 'percent' %}%
      (max {{ deployment_deletion_check.max_allowed }} apps){% endif %}.
      Apps to delete: {{ deleted_deployment_apps | join(', ') }}.
      To force deletion, set accept_deployment_app_removal to true.
    success_msg: >-
      Deployment app deletion within safe threshold
      ({{ deployment_deletion_check.deleted_count }}/{{ deployment_deletion_check.total_count }}
      apps on destination)
  when:
    - not (accept_deployment_app_removal | default(false))
    - deleted_deployment_apps | length > 0

- name: Deploy the apps from the staging directory to the deployment server
  become: false
  ansible.posix.synchronize:
    src: '{{ deployment_server_apps_staging_dir }}/deployment_server/'
    dest: '{{ splunk_path }}/etc/deployment-apps/'
    copy_links: true
    recursive: true
    checksum: true
    times: false
    delete: true
    owner: false
    group: false
    archive: false
    use_ssh_args: "{{ synchronize_module_use_ssh_args | default(false) }}"
    rsync_path: '{% if splunk_user == ansible_ssh_user %}rsync{% else %}sudo -u {{ splunk_user }} rsync{% endif %}'
    rsync_opts: '{{ deployment_apps_rsync_opts + item.rsync_opts if item.rsync_opts is defined else deployment_apps_rsync_opts }}'
  register: deploy_deployment_apps_status
  changed_when: >
    deploy_deployment_apps_status.stdout_lines | length > 0 and
    (
      not '.d...p..... ./' in  deploy_deployment_apps_status.stdout_lines | default([]) or
      deploy_deployment_apps_status.stdout_lines | default([]) | length > 0
    )
  notify: notify deployment server reload

- name: Cleanup deployment server after staging apps are completed
  become: false
  connection: local
  ansible.builtin.file:
    path: '{{ deployment_server_apps_staging_dir }}'
    state: absent
  delegate_to: localhost
  when:
    - cleanup_staging_apps | default(true)
  changed_when: false
  check_mode: false
